# ============================================================================
# IApi - Docker Compose Configuration
# ============================================================================
# Services:
#   - postgres: PostgreSQL 16 + pgvector extension
#   - backend: Flask API with gunicorn
#   - adminer: Database admin UI (optional)
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: iapi-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: iapi_dev
      POSTGRES_USER: iapi_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iapi_user -d iapi_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - iapi-network

  # --------------------------------------------------------------------------
  # IApi Backend (Flask + LlamaIndex + pgvector)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: iapi-backend
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
    
    environment:
      # Flask
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY}
      
      # Database
      DATABASE_URL: postgresql://iapi_user:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/iapi_dev
      
      # OpenAI (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      
      # Anthropic (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      
      # pgvector HNSW
      HNSW_M: 16
      HNSW_EF_CONSTRUCTION: 128
      HNSW_EF_SEARCH: 100
      
      # Rate Limiting
      TIER_FREE_QUERIES_PER_DAY: 100
      TIER_PRO_QUERIES_PER_DAY: 10000
      
      # Stripe (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4321}
    
    ports:
      - "5000:5000"
    
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/migrations:/app/migrations:ro
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - iapi-network

  # --------------------------------------------------------------------------
  # Adminer (Database Admin UI) - OPTIONAL
  # --------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: iapi-adminer
    restart: unless-stopped
    
    depends_on:
      - postgres
    
    ports:
      - "8080:8080"
    
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    
    networks:
      - iapi-network
    
    profiles:
      - tools  # Only start with: docker compose --profile tools up

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
    name: iapi_postgres_data

# ============================================================================
# Networks
# ============================================================================
networks:
  iapi-network:
    driver: bridge
    name: iapi_network

# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone to use for generating dates
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Prepend sys.path with script_location directory
prepend_sys_path = .

# Version location specification
version_locations = migrations/versions

# Version path separator
# version_path_separator = os  # default: use os.pathsep

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# sqlalchemy.url is set programmatically in env.py from Flask config
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks to run after migration files are generated
# Example: black formatting
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
